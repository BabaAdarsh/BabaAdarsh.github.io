---
layout: default
---
<article class="post">
  <h1>{{ page.title }}</h1>
  <p class="post-meta">{{ page.date | date: "%B %-d, %Y" }}{% if page.tags.size > 0 %} · {{ page.tags | join: ", " }}{% endif %}</p>
  {{ content }}
  <p class="back-link"><a href="{{ '/blog/' | relative_url }}">← All posts</a></p>
</article>
